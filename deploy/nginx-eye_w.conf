# Nginx для eye_w. Копировать: cp deploy/nginx-eye_w.conf /etc/nginx/sites-available/eye_w
# Все запросы к API проксируются одним правилом (orders, auth, cash, employees, analytics, price-list, health, docs).
# /auth/ со слэшем — чтобы /auth.js отдавался как файл из frontend.
# Замените eye34z.duckdns.org на свой домен или удалите server_name для приёма по IP.

server {
    listen 80;
    server_name eye34z.duckdns.org _;

    root /opt/eye_w/frontend;
    index login.html index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Все пути бэкенда — один блок. auth/ и analytics/ со слэшем, чтобы /auth.js и /analytics.html отдавались как статика
    # warehouse/ со слэшем, чтобы /warehouse.html отдавался из frontend
    location ~ ^/(orders|auth/|cash/|employees|analytics/|warehouse/|form-history|price-list|health|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location ~* \.(html|js|css)$ {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location / {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
