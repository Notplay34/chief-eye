<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="page-auth-guard.js"></script>
  <title>Касса номеров</title>
  <link rel="icon" href="favicon.svg?v=303-logo" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=PT+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=303-logo">
</head>
<body>
  <div id="appHeader"></div>
  <div class="plate-cash-page">
    <header class="header">
      <div>
        <h1 class="header__title">Касса номеров</h1>
        <p class="header__subtitle">Деньги кассы номеров и ручные продажи номеров с автоматическим списанием заготовок.</p>
      </div>
    </header>

    <div class="plate-cash-toolbar plate-cash-toolbar--main">
      <div class="cash-date-filter" aria-label="Фильтр кассы номеров по дате">
        <input type="date" id="plateCashDateFilter" class="cash-date-filter__input">
        <button type="button" class="cash-date-filter__btn" id="btnPlateCashToday">Сегодня</button>
        <button type="button" class="cash-date-filter__btn" id="btnPlateCashAll">Все</button>
      </div>
      <button type="button" class="btn btn--primary" id="btnAddRow">Добавить строчку в кассу</button>
      <span id="plateCashMsg" class="plate-cash-msg"></span>
    </div>

    <div class="plate-cash-table-wrap">
      <table class="plate-cash-table" id="plateCashTable">
        <thead>
          <tr>
            <th class="col-name">Фамилия</th>
            <th class="col-quantity">Шт</th>
            <th class="col-amount">Сумма</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="plateCashBody">
          <tr><td colspan="4" class="plate-cash-msg">Загрузка…</td></tr>
        </tbody>
        <tfoot id="plateCashFoot">
          <tr>
            <td class="col-name">Итого в кассе</td>
            <td class="col-quantity"></td>
            <td class="col-amount" id="totalCell">0,00 ₽</td>
            <td class="col-del"></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <nav class="list-pager" aria-label="Страницы кассы номеров">
      <label class="list-pager__size">Показать
        <select id="plateCashPageSize">
          <option value="10">10</option>
          <option value="30" selected>30</option>
          <option value="50">50</option>
        </select>
      </label>
      <span class="list-pager__range" id="plateCashPageInfo">0–0</span>
      <button type="button" class="list-pager__btn" id="plateCashPagePrev">‹</button>
      <label class="list-pager__page">Страница
        <input type="number" min="1" id="plateCashPageNumber" value="1">
      </label>
      <button type="button" class="list-pager__btn" id="plateCashPageNext">›</button>
    </nav>
  </div>

  <script src="auth.js"></script>
  <script src="header-common.js"></script>
  <script src="plate-cash-page.js"></script>
</body>
</html>
