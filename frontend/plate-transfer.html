<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="page-auth-guard.js"></script>
  <title>Деньги за номера</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=PT+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=302-mobile">
</head>
<body>
  <div id="appHeader"></div>
  <div class="plate-cash-page">
    <header class="header">
      <div>
        <h1 class="header__title">Деньги за номера</h1>
        <p class="header__subtitle">Промежуточная касса: деньги передаются в кассу номеров только после выдачи номера клиенту.</p>
      </div>
    </header>

    <section class="plate-cash-kpi" id="plateTransferKpi">
      <div>
        <div class="cash-payout__label">К выдаче в кассу номеров</div>
        <div class="cash-payout__total" id="plateTransferTotal">0 ₽</div>
      </div>
      <div class="plate-transfer__meta" id="plateTransferMeta">0 человек · 0 шт</div>
      <button type="button" class="btn btn--primary" id="btnPlateTransferPay" disabled>Выдать в кассу номеров</button>
      <div class="plate-transfer-ready" id="plateTransferReadyList">
        <div class="plate-transfer-ready__empty">Нет строк к выдаче</div>
      </div>
    </section>

    <p id="plateTransferMsg" class="plate-cash-msg"></p>

    <div class="plate-cash-toolbar plate-cash-toolbar--main">
      <button type="button" class="btn btn--primary" id="btnAddTransferRow">Добавить строчку в кассу</button>
    </div>

    <div class="plate-transfer-workspace">
      <div class="plate-cash-table-wrap">
        <table class="plate-cash-table plate-transfer-table" id="plateTransferTable">
          <thead>
            <tr>
              <th class="col-name">Клиент</th>
              <th class="col-quantity">Шт</th>
              <th class="col-amount">Сумма</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody id="plateTransferBody">
            <tr><td colspan="4" class="plate-cash-msg">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>

      <section class="plate-transfer-history">
        <div class="plate-transfer-history__head">
        <div>
          <h2>История выдачи</h2>
          <p id="plateTransferHistoryMeta">0 дней · 0 ₽</p>
        </div>
      </div>
      <div class="plate-transfer-history__list" id="plateTransferHistoryBody">
        <div class="plate-transfer-ready__empty">Загрузка…</div>
      </div>
      <nav class="list-pager" aria-label="Страницы истории выдачи">
        <label class="list-pager__size">Показать
          <select id="plateTransferHistoryPageSize">
            <option value="10">10</option>
            <option value="30" selected>30</option>
            <option value="50">50</option>
          </select>
        </label>
        <span class="list-pager__range" id="plateTransferHistoryPageInfo">0–0</span>
        <button type="button" class="list-pager__btn" id="plateTransferHistoryPrev">‹</button>
        <label class="list-pager__page">Страница
          <input type="number" min="1" id="plateTransferHistoryPageNumber" value="1">
        </label>
        <button type="button" class="list-pager__btn" id="plateTransferHistoryNext">›</button>
      </nav>
    </section>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="header-common.js"></script>
  <script src="plate-transfer-page.js?v=20260426-history-days"></script>
</body>
</html>
