<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="page-auth-guard.js"></script>
  <title>Деньги за номера</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=PT+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="appHeader"></div>
  <div class="plate-cash-page">
    <header class="header">
      <div>
        <h1 class="header__title">Деньги за номера</h1>
        <p class="header__subtitle">Промежуточная касса: деньги передаются в кассу номеров только после выдачи номера клиенту.</p>
      </div>
    </header>

    <section class="plate-cash-kpi" id="plateTransferKpi">
      <div>
        <div class="cash-payout__label">К выдаче в кассу номеров</div>
        <div class="cash-payout__total" id="plateTransferTotal">0 ₽</div>
      </div>
      <div class="plate-transfer__meta" id="plateTransferMeta">0 человек · 0 шт</div>
      <button type="button" class="btn btn--primary" id="btnPlateTransferPay" disabled>Выдать в кассу номеров</button>
    </section>

    <p id="plateTransferMsg" class="plate-cash-msg"></p>

    <form class="plate-transfer-form" id="plateTransferForm">
      <label class="plate-transfer-form__field">
        <span>Клиент / основание</span>
        <input type="text" id="plateTransferName" placeholder="ФИО или причина" autocomplete="off">
      </label>
      <label class="plate-transfer-form__field plate-transfer-form__field--qty">
        <span>Шт</span>
        <input type="number" id="plateTransferQuantity" min="0" step="1" value="0">
      </label>
      <label class="plate-transfer-form__field plate-transfer-form__field--amount">
        <span>Сумма</span>
        <input type="number" id="plateTransferAmount" min="1" step="1" placeholder="0">
      </label>
      <button type="submit" class="btn btn--secondary">Добавить</button>
    </form>

    <div class="plate-cash-table-wrap">
      <table class="plate-cash-table plate-transfer-table" id="plateTransferTable">
        <thead>
          <tr>
            <th class="col-name">Клиент</th>
            <th class="col-quantity">Шт</th>
            <th class="col-amount">Сумма</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="plateTransferBody">
          <tr><td colspan="4" class="plate-cash-msg">Загрузка…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="header-common.js"></script>
  <script src="plate-transfer-page.js?v=20260426-manual"></script>
</body>
</html>
