<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="page-auth-guard.js"></script>
  <title>Номера — невыданные заказы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=PT+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=301-header-width">
</head>
<body>
  <div id="appHeader"></div>
  <div class="plate-page">
    <header class="header">
      <div>
        <h1 class="header__title">Номера</h1>
        <p class="header__subtitle">Невыданные номера — заказы павильона 2, ожидающие выдачи</p>
      </div>
    </header>
    <p class="plate-page__msg" id="pageMsg" style="display:none;"></p>

    <div id="orderList">
      <p class="empty-msg" id="emptyMsg">Загрузка…</p>
      <table class="plate-table" id="orderTable" style="display:none">
        <thead>
          <tr>
            <th>№</th>
            <th>Клиент</th>
            <th>Марка, модель</th>
            <th>Сумма</th>
            <th title="Заявление на номера">Заявл.</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="orderBody"></tbody>
      </table>
    </div>
  </div>

  <div id="modalPay" class="modal" aria-hidden="true">
    <div class="modal__box">
      <h3>Доплата за номера</h3>
      <p class="text-caption" style="margin:0 0 0.5rem;">Заказ <strong id="modalOrderId"></strong></p>
      <label for="modalAmount">Сумма, ₽</label>
      <input type="number" id="modalAmount" min="1" step="1" value="0">
      <div class="row-actions">
        <button type="button" class="btn btn--primary" id="modalSubmit">Принять</button>
        <button type="button" class="btn btn--secondary" id="modalCancel">Отмена</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="header-common.js"></script>
  <script src="plate-operator-page.js"></script>
</body>
</html>
