<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="page-auth-guard.js?v=293-plate-report-txt"></script>
  <title>Отчёт по номерам</title>
  <link rel="icon" href="favicon.ico?v=304-logo-mark" sizes="any">
  <link rel="icon" href="favicon.svg?v=304-logo-mark" type="image/svg+xml">
  <link rel="icon" href="favicon-32.png?v=304-logo-mark" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=304-logo-mark">
  <link rel="mask-icon" href="assets/logo-mask.svg?v=304-logo-mark" color="#0f766e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=PT+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=305-partner-expense-rows">
</head>
<body>
  <div id="appHeader"></div>
  <div class="admin analytics-page plate-report-page">
    <header class="header">
      <div>
        <h1 class="header__title">Отчёт по номерам</h1>
        <p class="header__subtitle">Месячный расчёт выручки, расходов, долей и суммы к отправке партнёру.</p>
      </div>
    </header>

    <section class="analytics-toolbar plate-report-toolbar">
      <label class="analytics-filter">
        <span>С</span>
        <input type="date" id="reportDateFrom">
      </label>
      <label class="analytics-filter">
        <span>По</span>
        <input type="date" id="reportDateTo">
      </label>
      <button type="button" class="btn btn--secondary" id="btnReportRefresh">Обновить</button>
      <button type="button" class="btn btn--secondary" id="btnDownloadReport">Создать TXT</button>
      <button type="button" class="btn btn--primary" id="btnClosePlateMonth">Создать отрицательную операцию</button>
    </section>

    <section class="analytics-panel plate-report-partner-panel">
      <div class="analytics-panel__header">
        <h2>Расходы партнёра</h2>
        <p>Название расхода и сумма попадут в расчёт и текстовый отчёт.</p>
      </div>
      <div class="plate-report-expense-list" id="partnerExpenseRows"></div>
      <button type="button" class="btn btn--secondary" id="btnAddPartnerExpense">Добавить расход партнёра</button>
    </section>

    <div id="plateReportApp">
      <div class="analytics-empty">Загрузка отчёта…</div>
    </div>
  </div>

  <script src="auth.js?v=293-plate-report-txt"></script>
  <script src="header-common.js?v=293-plate-report-txt"></script>
  <script src="plate-report.js?v=305-partner-expense-rows"></script>
</body>
</html>
