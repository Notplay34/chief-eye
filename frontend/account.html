<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="page-auth-guard.js"></script>
  <title>Меню</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=PT+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="appHeader"></div>
  <div class="account">
    <nav class="account__sidebar">
      <div class="menu-group">
        <div class="menu-group__title">Подготовка документов</div>
        <a href="index.html">Форма подготовки документов</a>
      </div>
      <div class="menu-group" id="menuGroupPlate">
        <div class="menu-group__title">Номера</div>
        <a href="plate-operator.html" id="linkPlate" style="display:none;">Невыданные номера</a>
        <a href="plate-cash.html" id="linkPlateCash" style="display:none;">Касса номеров</a>
        <a href="warehouse.html" id="linkWarehouse" style="display:none;">Склад заготовок</a>
      </div>
      <div class="menu-group" id="menuGroupCash">
        <div class="menu-group__title">Касса (павильон 1)</div>
        <a href="cash-shifts.html" id="linkCash" style="display:none;">Касса и смены</a>
      </div>
      <div class="menu-group" id="menuGroupAdmin">
        <div class="menu-group__title">Управление</div>
        <a href="analytics-docs.html" id="linkAnalyticsDocs" style="display:none;">Аналитика — Документы</a>
        <a href="analytics-plates.html" id="linkAnalyticsPlates" style="display:none;">Аналитика — Номера</a>
        <a href="admin.html" id="linkAdmin" style="display:none;">Админка</a>
        <a href="users.html" id="linkUsers" style="display:none;">Управление аккаунтами</a>
      </div>
      <div class="menu-group" style="margin-top: 1.5rem;">
        <a href="#" id="linkChangePassword" style="color: var(--text-muted);">Сменить пароль</a>
        <a href="login.html" id="linkLogout" style="color: var(--text-muted);">Выйти</a>
      </div>
    </nav>
    <main class="account__content">
      <h1>Меню</h1>
      <p id="userInfo">Выберите раздел слева.</p>
    </main>
  </div>
  <div id="modalChangePassword" class="modal" aria-hidden="true">
    <div class="modal__box">
      <h3>Сменить пароль</h3>
      <label for="inputOldPassword">Текущий пароль</label>
      <input type="password" id="inputOldPassword" autocomplete="current-password">
      <label for="inputNewPassword">Новый пароль</label>
      <input type="password" id="inputNewPassword" autocomplete="new-password">
      <label for="inputNewPassword2">Повторите новый пароль</label>
      <input type="password" id="inputNewPassword2" autocomplete="new-password">
      <p id="passwordMsg" class="text-caption" style="margin:0 0 0.75rem;"></p>
      <div class="row-actions">
        <button type="button" class="btn btn--primary" id="btnSubmitPassword">Сохранить</button>
        <button type="button" class="btn btn--secondary" id="btnCancelPassword">Отмена</button>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
  <script src="header-common.js"></script>
  <script src="account.js"></script>
</body>
</html>
